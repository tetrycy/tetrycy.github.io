window._sheetExec=function(idx){
  const a=window._sheetActs[idx];if(!a)return;
  hideSheet();
  const M=manMatch,ti=0;M.tk(3+Math.random()*4);checkAndFireCards(M);
  if(a.isShot){a.exec();manRenderNewFrames();setTimeout(manNextPoss,400);return;}
  if(Math.random()<a.risk){
    let outcome;
    if(a.id==='dribble'){M.tm[ti].s.drib++;M.frame(`${M.car.n} — strata drybling`,'fail');outcome=M.onDribbleLost(ti)}
    else if(a.id==='cross'){M.frame(`${M.car.n} — dośrodkowanie niecelne`,'fail');outcome=M.onCrossLost(ti)}
    else{M.frame(`${M.car.n} — strata (${a.id})`,'fail');outcome=M.onPassLost(ti,a.id)}
    manRenderNewFrames();
    if(outcome==='continue'){setTimeout(()=>{showActions(buildManActions(M,ti),'🎮 Twoja posesja')},300);return;}
    setTimeout(manNextPoss,400);return;}
  // Counter special
  if(a.exec.toString().includes('manCounterStep')){
    a.exec();manRenderNewFrames();manCounterStep++;setTimeout(showCounterActions,300);return;}
  a.exec();manRenderNewFrames();
  // If counter ongoing
  if(M.mods.counter&&!a.isShot){manCounterStep++;if(manCounterStep<4){setTimeout(showCounterActions,300);}else{M.frame('Obrona wróciła','info');manRenderNewFrames();setTimeout(manNextPoss,400);}return;}
  setTimeout(()=>{showActions(buildManActions(M,ti),'🎮 Twoja posesja')},300);};

function manFinish(){
  hideSheet();checkAndFireCards(manMatch);
  const tot=manMatch.pt[0]+manMatch.pt[1];
  manMatch.tm[0].s.poss=tot>0?Math.round(manMatch.pt[0]/tot*100):50;manMatch.tm[1].s.poss=100-manMatch.tm[0].s.poss;
  manMatch.frame(`KONIEC — ${manMatch.tm[0].name} ${manMatch.score[0]}:${manMatch.score[1]} ${manMatch.tm[1].name}`,'half');
  manRenderNewFrames();matchData={teams:manMatch.tm,score:manMatch.score,frames:manMatch.frames};showStats();
  document.getElementById('btnPlay').style.display='';document.getElementById('btnManual').style.display='';
  document.getElementById('btnTeam').style.display='none';
  document.getElementById('teamRow').style.display='';document.getElementById('gkRow').style.display='';}

// ========== GK CARDS ==========
function renderGkCards(){
  const hi=document.getElementById('homeTeam').selectedIndex;const ai=document.getElementById('awayTeam').selectedIndex;
  function card(team,sideClass){
    const gk=team.players.find(p=>p.p==='GK');if(!gk)return'';
    const a=gk.gk||{ref:gk.o,s11:gk.o,air:gk.o,pen:gk.o,han:gk.o,kon:gk.o};
    const attrs=[{k:'REF',v:a.ref},{k:'1v1',v:a.s11},{k:'AIR',v:a.air},{k:'PEN',v:a.pen},{k:'HAN',v:a.han},{k:'KON',v:a.kon}];
    const max=Math.max(...attrs.map(x=>x.v)),min=Math.min(...attrs.map(x=>x.v));
    return`<div class="gk-mini ${sideClass}">
      <div class="gkn">${gk.n} <span style="color:var(--dim);font-size:8px">(${gk.o})</span></div>
      <div style="color:var(--dim);font-size:8px;margin-bottom:4px">${team.name}</div>
      <div class="gk-attrs">${attrs.map(({k,v})=>`<div class="gk-at"><div class="av" style="color:${v===max?'var(--ac)':v===min?'var(--rd)':'var(--tx)'}">${v}</div><div class="al">${k}</div></div>`).join('')}</div>
    </div>`;}
  document.getElementById('gkRow').innerHTML=card(TEAMS[hi],'h')+card(TEAMS[ai],'a');}

// ========== EVENT DELEGATION ==========
document.addEventListener('click', function(e){
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;
  const name = el.dataset.name ? decodeURIComponent(el.dataset.name) : null;
  if(action === 'lpick'){
    const ti = +el.dataset.ti, slot = +el.dataset.slot;
    if(el.classList.contains('used')) return;
    lpPickPlayer(ti, slot, name);
  } else if(action === 'subout'){
    selSubOut(name);
  } else if(action === 'subin'){
    selSubIn(name);
  } else if(action === 'profile'){
    openPlayerProfile(name);
  }
});

// ========== INIT ==========
function init(){
  const hs=document.getElementById('homeTeam'),as=document.getElementById('awayTeam');
  TEAMS.forEach((t,i)=>{
    hs.innerHTML+=`<option value="${i}" ${i===0?'selected':''}>${t.name} (${t.ovr})</option>`;
    as.innerHTML+=`<option value="${i}" ${i===2?'selected':''}>${t.name} (${t.ovr})</option>`;});
  hs.onchange=as.onchange=()=>{renderGkCards();};
  resizeCanvas();rollConditions();renderGkCards();
  drawPitch(document.getElementById('pc').getContext('2d'));
  // Score init
  document.getElementById('hName').textContent=TEAMS[0].name;
  document.getElementById('aName').textContent=TEAMS[2].name;}

init();
</script>
